<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bloc-Notes</title>
</head>
<body style="
margin:0;
padding:0;
font-family:sans-serif;
display:flex;
flex-direction:column;
height:100vh;
background:#1e1e1e;
color:#ccc;"
>

    <div id="toolbar" style="
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 10px;
    background:#2d2d2d;
    border-bottom:1px solid #444;">
        <button onclick="api.openFile()" style="
        padding:4px 12px;
        background:#3a3a3a;
        color:#ccc;
        border:1px solid #555;
        cursor:pointer;">Ouvrir</button>
        <button onclick="api.saveFile(document.getElementById('editor').value)" style="
        padding:4px 12px;
        background:#3a3a3a;
        color:#ccc;
        border:1px solid #555;
        cursor:pointer;">Sauvegarder</button>
        <button id="themeBtn" onclick="toggleTheme()" style="
        padding:4px 12px;
        background:#3a3a3a;
        color:#ccc;
        border:1px solid #555;
        cursor:pointer;">Theme clair</button>
        <span id="counter" style="
        margin-left:auto;
        font-size:13px;
        color:#888;">0 caracteres</span>
    </div>

    <textarea id="editor" style="
    flex:1;
    resize:none;
    padding:12px;
    font-family:monospace;
    font-size:14px;
    border:none;
    outline:none;
    background:#1e1e1e;
    color:#ddd;" spellcheck="false"></textarea>

    <script src="renderer.js"></script>
</body>
</html>
