<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bloc-Notes</title>
    <style>
        * { transition: background 0.25s, color 0.2s, border-color 0.25s, box-shadow 0.2s; }
        #toolbar button {
            border-radius: 5px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
        }
        #toolbar button:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(78,201,176,0.25);
        }
        #toolbar button:active {
            transform: translateY(0);
        }
        textarea::selection {
            background: rgba(78,201,176,0.3);
        }
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: #4ec9b0; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #3ba892; }
    </style>
</head>
<body style="
margin:0;
padding:0;
font-family:sans-serif;
display:flex;
flex-direction:column;
height:100vh;
background:#1a1a2e;
color:#ccc;"
>

    <div id="toolbar" style="
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    background:#252530;
    border-bottom:2px solid #4ec9b0;">
        <button onclick="api.openFile()" style="
        padding:5px 14px;
        background:#2a4a44;
        color:#4ec9b0;
        border:1px solid #4ec9b0;
        cursor:pointer;">Ouvrir</button>
        <button onclick="api.saveFile(document.getElementById('editor').value)" style="
        padding:5px 14px;
        background:#4ec9b0;
        color:#1a1a2e;
        border:1px solid #4ec9b0;
        cursor:pointer;">Sauvegarder</button>
        <button id="themeBtn" onclick="toggleTheme()" style="
        padding:5px 14px;
        background:#2a4a44;
        color:#4ec9b0;
        border:1px solid #4ec9b0;
        cursor:pointer;">Theme clair</button>
        <span id="counter" style="
        margin-left:auto;
        font-size:13px;
        color:#4ec9b0;
        opacity:0.7;">0 caracteres</span>
    </div>

    <textarea id="editor" style="
    flex:1;
    resize:none;
    padding:14px 16px;
    font-family:'Consolas', 'Fira Code', monospace;
    font-size:14px;
    line-height:1.6;
    border:none;
    outline:none;
    border-left:3px solid #4ec9b0;
    background:#1a1a2e;
    color:#e0e0e0;" spellcheck="false"></textarea>

    <script src="renderer.js"></script>
</body>
</html>
